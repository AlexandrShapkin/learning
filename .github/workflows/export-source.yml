name: Export repository snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Package repository
        run: tar --exclude=.git -czf "$RUNNER_TEMP/learning-source.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: learning-source
          path: ${{ runner.temp }}/learning-source.tar.gz
          retention-days: 1
