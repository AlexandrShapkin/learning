name: Export repository snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Package repository
        run: tar --exclude=.git --exclude=learning-source.tar.gz -czf learning-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: learning-source
          path: learning-source.tar.gz
          retention-days: 1
